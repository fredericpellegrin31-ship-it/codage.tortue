<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Tortue Codeuse</title>
    <!-- Chargement de Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Styles personnalisés pour des animations fluides */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        #turtle-sprite {
            transition: left 0.5s ease-in-out, top 0.5s ease-in-out, transform 0.5s ease-in-out;
        }

        .bounce { animation: bounce 1s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(-10%); }
            50% { transform: translateY(10%); }
        }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen bg-emerald-50 flex flex-col">

    <header class="bg-white shadow-sm p-4 z-10 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-600 text-white p-2 rounded-lg">
                <!-- Icône Étoile -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800 leading-tight">La Tortue Codeuse</h1>
                <p class="text-sm text-slate-500">Apprends à programmer en t'amusant !</p>
            </div>
        </div>
        
        <div class="flex gap-2 bg-slate-100 p-1 rounded-lg" id="level-buttons-container">
            <!-- Les boutons de niveau seront générés ici -->
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10">
        
        <!-- Colonne Gauche : Le jeu (Grille et messages) -->
        <div class="flex flex-col items-center justify-start gap-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm w-full max-w-[500px]">
                <div id="grid-container" class="relative aspect-square bg-green-50 border-2 border-green-200 rounded-xl overflow-hidden grid grid-cols-8 grid-rows-8">
                    <!-- Les cases, la salade, les obstacles et la tortue seront générés ici -->
                </div>
            </div>

            <!-- Conteneur pour les messages d'état (Succès, Erreur, Info) -->
            <div id="message-container" class="w-full max-w-[500px]">
                <!-- Les messages seront injectés ici par JS -->
            </div>
        </div>

        <!-- Colonne Droite : L'interface de programmation -->
        <div class="flex flex-col gap-6">
            
            <!-- Bloc 1 : Action Pad (Style TuxBot) -->
            <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col items-center">
                <h2 class="text-lg font-bold text-slate-800 mb-6 self-start">1. Panneau de commande</h2>
                
                <div class="grid grid-cols-3 gap-3 w-fit">
                    <!-- Ligne 1 -->
                    <div></div>
                    <button id="btn-forward" class="bg-blue-500 hover:bg-blue-600 text-white w-16 h-16 rounded-xl flex flex-col items-center justify-center shadow active:scale-95 transition-transform disabled:opacity-50">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                    </button>
                    <div></div>
                    
                    <!-- Ligne 2 -->
                    <button id="btn-left" class="bg-orange-500 hover:bg-orange-600 text-white w-16 h-16 rounded-xl flex items-center justify-center shadow active:scale-95 transition-transform disabled:opacity-50">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                    </button>
                    
                    <button id="btn-run" title="Lancer le programme" class="bg-emerald-500 hover:bg-emerald-600 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform disabled:opacity-50 border-4 border-emerald-200 z-10">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ml-1"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </button>
                    
                    <button id="btn-right" class="bg-green-500 hover:bg-green-600 text-white w-16 h-16 rounded-xl flex items-center justify-center shadow active:scale-95 transition-transform disabled:opacity-50">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    </button>
                    
                    <!-- Ligne 3 -->
                    <div></div>
                    <button id="btn-backward" class="bg-indigo-500 hover:bg-indigo-600 text-white w-16 h-16 rounded-xl flex items-center justify-center shadow active:scale-95 transition-transform disabled:opacity-50">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                    </button>
                    <div></div>
                </div>
            </div>

            <!-- Bloc 2 : Affichage du Programme -->
            <div class="bg-white p-5 rounded-2xl shadow-sm flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-3">
                        <h2 class="text-lg font-bold text-slate-800">2. Ton programme</h2>
                        <span id="program-count" class="text-sm font-medium bg-slate-100 px-3 py-1 rounded-full text-slate-500">
                            0 / 24 blocs
                        </span>
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-reset-pos" title="Replacer la tortue au départ" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-slate-700 disabled:opacity-50 transition-colors">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                        </button>
                        <button id="btn-clear" title="Effacer tout le programme" class="p-2 bg-red-100 hover:bg-red-200 rounded-lg text-red-600 disabled:opacity-50 transition-colors">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>
                </div>
                
                <div id="program-display" class="flex-1 bg-slate-50 rounded-xl border-2 border-slate-200 border-dashed p-4 min-h-[200px] flex content-start flex-wrap gap-2 overflow-y-auto">
                    <!-- Les blocs de code seront injectés ici -->
                </div>
            </div>

        </div>
    </main>

    <script>
        const GRID_SIZE = 8;
        const MAX_PROGRAM_LENGTH = 24;

        // Dictionnaire des commandes et de leurs styles
        const COMMAND_DETAILS = {
            'forward': { color: 'bg-blue-500', svg: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>' },
            'backward': { color: 'bg-indigo-500', svg: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>' },
            'left': { color: 'bg-orange-500', svg: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>' },
            'right': { color: 'bg-green-500', svg: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>' }
        };

        // État de l'application
        let state = {
            level: 1,
            maxUnlockedLevel: 1,
            gameState: null,
            currentRobot: null,
            program: [],
            executing: false,
            activeCmdIndex: -1,
            result: null // 'success', 'wall', 'obstacle', 'miss'
        };

        // Algorithme BFS pour valider la faisabilité d'un niveau aléatoire
        function getShortestPath(startX, startY, startDir, targetX, targetY, obstacles) {
            let queue = [{ x: startX, y: startY, dir: startDir, path: [] }];
            let visited = new Set();
            visited.add(`${startX},${startY},${startDir}`);

            let isObstacle = (x, y) => obstacles.some(o => o.x === x && o.y === y);

            while (queue.length > 0) {
                let { x, y, dir, path } = queue.shift();
                if (x === targetX && y === targetY) return path;

                let moves = [];
                // Avancer
                let fx = x, fy = y;
                if (dir === 0) fy--; else if (dir === 1) fx++; else if (dir === 2) fy++; else if (dir === 3) fx--;
                if (fx >= 0 && fx < GRID_SIZE && fy >= 0 && fy < GRID_SIZE && !isObstacle(fx, fy)) {
                    moves.push({ x: fx, y: fy, dir, action: 'forward' });
                }
                // Reculer
                let bx = x, by = y;
                if (dir === 0) by++; else if (dir === 1) bx--; else if (dir === 2) by--; else if (dir === 3) bx++;
                if (bx >= 0 && bx < GRID_SIZE && by >= 0 && by < GRID_SIZE && !isObstacle(bx, by)) {
                    moves.push({ x: bx, y: by, dir, action: 'backward' });
                }
                // Pivoter
                moves.push({ x, y, dir: (dir + 3) % 4, action: 'left' });
                moves.push({ x, y, dir: (dir + 1) % 4, action: 'right' });

                for (let m of moves) {
                    let key = `${m.x},${m.y},${m.dir}`;
                    if (!visited.has(key)) {
                        visited.add(key);
                        queue.push({ x: m.x, y: m.y, dir: m.dir, path: [...path, m.action] });
                    }
                }
            }
            return null;
        }

        function createLevel(lvl) {
            let robot, target, obstacles = [];

            if (lvl === 1) {
                // Niveau 1 : Uniquement avancer, orienté vers le haut (0: Nord)
                let x = Math.floor(Math.random() * GRID_SIZE);
                let y = Math.floor(Math.random() * 4) + 4; // Entre 4 et 7
                robot = { x, y, dir: 0 };
                let dist = Math.floor(Math.random() * 3) + 2; // Distance de 2 à 4 cases
                target = { x, y: y - dist };
                return { robot, target, obstacles };
            }

            if (lvl === 2) {
                // Niveau 2 : Exactement un virage nécessaire
                let dir1 = Math.floor(Math.random() * 4);
                let d1 = Math.floor(Math.random() * 3) + 1;
                let d2 = Math.floor(Math.random() * 3) + 1;
                let turn = Math.random() < 0.5 ? 1 : -1;
                let dir2 = (dir1 + turn + 4) % 4;

                let ix = Math.floor(Math.random() * 6) + 1;
                let iy = Math.floor(Math.random() * 6) + 1;

                let startX = ix, startY = iy;
                if (dir1 === 0) startY += d1; else if (dir1 === 1) startX -= d1;
                else if (dir1 === 2) startY -= d1; else if (dir1 === 3) startX += d1;

                let endX = ix, endY = iy;
                if (dir2 === 0) endY -= d2; else if (dir2 === 1) endX += d2;
                else if (dir2 === 2) endY += d2; else if (dir2 === 3) endX -= d2;

                if (startX >= 0 && startX < GRID_SIZE && startY >= 0 && startY < GRID_SIZE &&
                    endX >= 0 && endX < GRID_SIZE && endY >= 0 && endY < GRID_SIZE &&
                    (startX !== endX || startY !== endY)) {
                    return { robot: { x: startX, y: startY, dir: dir1 }, target: { x: endX, y: endY }, obstacles: [] };
                } else {
                    return createLevel(lvl); 
                }
            }

            // Niveaux 3, 4 et 5 : Génération aléatoire filtrée avec protection anti-blocage
            let attempts = 0;
            while (attempts < 2000) {
                attempts++;
                let rx = Math.floor(Math.random() * GRID_SIZE);
                let ry = Math.floor(Math.random() * GRID_SIZE);
                let rdir = Math.floor(Math.random() * 4);
                let tx = Math.floor(Math.random() * GRID_SIZE);
                let ty = Math.floor(Math.random() * GRID_SIZE);
                if (Math.abs(rx - tx) + Math.abs(ry - ty) < (lvl === 3 ? 2 : 3)) continue; 

                let obs = [];
                // Pour le niveau 3, on ajoute 3 obstacles pour forcer des virages et faciliter l'obtention du zigzag
                let numObs = lvl === 3 ? 3 : (lvl === 4 ? 6 : (lvl === 5 ? 12 : 0));
                for (let i = 0; i < numObs; i++) {
                    let ox = Math.floor(Math.random() * GRID_SIZE);
                    let oy = Math.floor(Math.random() * GRID_SIZE);
                    if ((ox !== rx || oy !== ry) && (ox !== tx || oy !== ty)) {
                        if (!obs.some(o => o.x === ox && o.y === oy)) obs.push({ x: ox, y: oy });
                    }
                }

                let path = getShortestPath(rx, ry, rdir, tx, ty, obs);
                if (path) {
                    let turns = path.filter(p => p === 'left' || p === 'right').length;
                    
                    if (lvl === 3) {
                        // En cas de difficultés de génération, on assouplit légèrement les critères après 200 essais
                        let requiredTurns = attempts > 200 ? 1 : 2;
                        let requiredLength = attempts > 200 ? 3 : 4;
                        if (turns >= requiredTurns && path.length >= requiredLength) {
                            return { robot: { x: rx, y: ry, dir: rdir }, target: { x: tx, y: ty }, obstacles: obs };
                        }
                    } else if (lvl === 4) {
                        let requiredLength = attempts > 200 ? 4 : 5;
                        if (path.length >= requiredLength) {
                            return { robot: { x: rx, y: ry, dir: rdir }, target: { x: tx, y: ty }, obstacles: obs };
                        }
                    } else if (lvl === 5) {
                        let requiredLength = attempts > 200 ? 5 : 7;
                        if (path.length >= requiredLength) {
                            return { robot: { x: rx, y: ry, dir: rdir }, target: { x: tx, y: ty }, obstacles: obs };
                        }
                    }
                }
            }

            // Fallback de secours ultime pour éviter tout freeze dans l'environnement de l'élève
            return {
                robot: { x: 0, y: GRID_SIZE - 1, dir: 0 },
                target: { x: GRID_SIZE - 1, y: 0 },
                obstacles: [{ x: 3, y: 3 }, { x: 4, y: 4 }]
            };
        }

        function renderUI() {
            renderHeader();
            renderGrid();
            renderProgram();
            renderMessages();
            updateButtonsState();
        }

        function renderHeader() {
            const container = document.getElementById('level-buttons-container');
            container.innerHTML = '';
            for (let l = 1; l <= 5; l++) {
                const btn = document.createElement('button');
                const isLocked = l > state.maxUnlockedLevel;
                const isActive = state.level === l;
                
                let classes = `px-4 py-2 rounded-md font-bold transition-colors flex items-center gap-1.5 `;
                if (isActive) classes += `bg-white shadow-sm text-emerald-600 `;
                else classes += `text-slate-500 hover:bg-slate-200 `;
                if (isLocked || state.executing) classes += `opacity-50 cursor-not-allowed `;
                
                btn.className = classes;
                btn.disabled = isLocked || state.executing;
                btn.onclick = () => {
                    if (!state.executing && l <= state.maxUnlockedLevel) {
                        loadLevel(l);
                    }
                };
                
                btn.innerHTML = `Niv ${l} ${isLocked ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>' : ''}`;
                container.appendChild(btn);
            }
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            // Dessiner les cases, la cible et les obstacles
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                let x = i % GRID_SIZE;
                let y = Math.floor(i / GRID_SIZE);
                
                let isTarget = state.gameState.target.x === x && state.gameState.target.y === y;
                let isObstacle = state.gameState.obstacles.some(o => o.x === x && o.y === y);

                const cell = document.createElement('div');
                cell.className = "border border-green-200 flex items-center justify-center relative";
                
                // Motif herbe
                const bg = document.createElement('div');
                bg.className = "absolute inset-0 opacity-20 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-green-300 to-transparent";
                cell.appendChild(bg);

                if (isTarget) {
                    const targetEl = document.createElement('span');
                    targetEl.className = "text-3xl lg:text-4xl drop-shadow-md z-10 bounce";
                    targetEl.textContent = "🥬"; // Salade
                    cell.appendChild(targetEl);
                } else if (isObstacle) {
                    const obsEl = document.createElement('span');
                    obsEl.className = "text-3xl lg:text-4xl drop-shadow-md z-10";
                    obsEl.textContent = "🪨"; // Rocher
                    cell.appendChild(obsEl);
                }
                container.appendChild(cell);
            }

            // Dessiner la tortue en position absolue pour permettre le déplacement fluide
            if (state.currentRobot) {
                const turtle = document.createElement('div');
                turtle.id = "turtle-sprite";
                turtle.className = "absolute z-20 w-[12.5%] h-[12.5%] flex items-center justify-center drop-shadow-xl";
                
                // Placement basé sur des pourcentages pour s'adapter à la taille de la grille
                turtle.style.left = `${state.currentRobot.x * 12.5}%`;
                turtle.style.top = `${state.currentRobot.y * 12.5}%`;
                turtle.style.transform = `rotate(${state.currentRobot.dir * 90}deg)`;

                // SVG de la tortue vue de haut
                turtle.innerHTML = `
                    <svg viewBox="0 0 100 100" class="w-4/5 h-4/5">
                        <!-- Nageoires -->
                        <path d="M 25 25 L 10 10 M 75 25 L 90 10 M 25 75 L 10 90 M 75 75 L 90 90" stroke="#166534" stroke-width="8" stroke-linecap="round"/>
                        <!-- Queue -->
                        <polygon points="45,85 55,85 50,98" fill="#166534" />
                        <!-- Tête -->
                        <circle cx="50" cy="15" r="14" fill="#22c55e" stroke="#166534" stroke-width="2" />
                        <!-- Yeux -->
                        <circle cx="45" cy="10" r="2.5" fill="#000" />
                        <circle cx="55" cy="10" r="2.5" fill="#000" />
                        <!-- Carapace -->
                        <ellipse cx="50" cy="52" rx="32" ry="38" fill="#15803d" stroke="#14532d" stroke-width="4"/>
                        <!-- Motifs de la carapace (Hexagones stylisés simples) -->
                        <path d="M 50 22 L 68 35 L 68 65 L 50 78 L 32 65 L 32 35 Z" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
                    </svg>
                `;
                container.appendChild(turtle);
            }
        }

        function renderProgram() {
            const container = document.getElementById('program-display');
            const countLabel = document.getElementById('program-count');
            
            container.innerHTML = '';
            countLabel.textContent = `${state.program.length} / ${MAX_PROGRAM_LENGTH} blocs`;

            if (state.program.length === 0) {
                container.innerHTML = `<div class="w-full h-full flex items-center justify-center text-slate-400 italic text-center px-4">Utilise les boutons à gauche pour construire ton programme...</div>`;
                return;
            }

            state.program.forEach((cmdKey, idx) => {
                const cmd = COMMAND_DETAILS[cmdKey];
                const isActive = idx === state.activeCmdIndex;
                
                const block = document.createElement('div');
                block.className = `${cmd.color} text-white w-12 h-12 rounded-lg flex items-center justify-center shadow-sm relative transition-all ${isActive ? 'ring-4 ring-yellow-400 scale-110 z-10' : ''}`;
                block.innerHTML = cmd.svg;

                const num = document.createElement('span');
                num.className = "absolute -top-2 -right-2 bg-white text-slate-800 text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full shadow-sm border border-slate-200";
                num.textContent = idx + 1;
                block.appendChild(num);

                container.appendChild(block);
            });
        }

        function renderMessages() {
            const container = document.getElementById('message-container');
            container.innerHTML = '';

            if (state.result) {
                const isSuccess = state.result === 'success';
                const div = document.createElement('div');
                div.className = `p-4 rounded-xl flex items-center flex-wrap gap-3 font-medium text-lg fade-in ${
                    isSuccess ? 'bg-green-100 text-green-800 border-2 border-green-200' : 
                    'bg-red-100 text-red-800 border-2 border-red-200'
                }`;
                
                let icon = isSuccess 
                    ? '<svg class="shrink-0" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
                    : '<svg class="shrink-0" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
                
                let text = "";
                if (state.result === 'success') text = "Bravo ! La tortue a mangé la salade !";
                else if (state.result === 'wall') text = "Aïe ! La tortue a percuté le bord du terrain.";
                else if (state.result === 'obstacle') text = "Boum ! La tortue a foncé dans un rocher.";
                else if (state.result === 'miss') text = "Zut ! La tortue n'est pas arrivée sur la salade.";

                let nextBtn = '';
                if (isSuccess && state.level < 5) {
                    nextBtn = `<button onclick="loadLevel(${state.level + 1})" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm hover:bg-green-700 transition-colors ml-auto whitespace-nowrap">Niveau suivant ➡️</button>`;
                }

                div.innerHTML = `<div class="flex items-center gap-3 w-full">${icon}<span class="flex-1">${text}</span>${nextBtn}</div>`;
                container.appendChild(div);
            } else {
                const div = document.createElement('div');
                div.className = "p-4 bg-emerald-50 text-emerald-800 rounded-xl flex items-center gap-3 border border-emerald-100";
                
                let msg = "";
                if (state.level === 1) msg = "Fais avancer la tortue jusqu'à la salade.";
                else if (state.level === 2) msg = "Utilise les blocs 'Pivoter' pour tourner vers la salade.";
                else if (state.level >= 3 && state.level <= 4) msg = "Observe bien le parcours et crée ton programme.";
                else if (state.level === 5) msg = "Le labyrinthe est complexe ! Tu peux reculer si besoin.";

                div.innerHTML = `<svg class="shrink-0" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg><span class="text-sm font-medium">${msg}</span>`;
                container.appendChild(div);
            }
        }

        function updateButtonsState() {
            document.getElementById('btn-forward').disabled = state.executing;
            document.getElementById('btn-backward').disabled = state.executing;
            document.getElementById('btn-left').disabled = state.executing;
            document.getElementById('btn-right').disabled = state.executing;
            document.getElementById('btn-run').disabled = state.executing || state.program.length === 0;
            document.getElementById('btn-clear').disabled = state.executing || state.program.length === 0;
            document.getElementById('btn-reset-pos').disabled = state.executing || state.result === null;
        }

        function loadLevel(l) {
            state.level = l;
            const newLvl = createLevel(l);
            state.gameState = newLvl;
            state.currentRobot = { ...newLvl.robot };
            state.program = [];
            state.result = null;
            state.activeCmdIndex = -1;
            renderUI();
        }

        function addCommand(cmd) {
            if (!state.executing && state.program.length < MAX_PROGRAM_LENGTH) {
                state.program.push(cmd);
                renderProgram();
                updateButtonsState();
            }
        }

        function clearProgram() {
            if (!state.executing) {
                state.program = [];
                renderProgram();
                updateButtonsState();
            }
        }

        function resetRobot() {
            if (!state.executing) {
                state.currentRobot = { ...state.gameState.robot };
                state.result = null;
                state.activeCmdIndex = -1;
                renderUI();
            }
        }

        // Fonction pour attendre x millisecondes
        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function runSequence() {
            if (state.program.length === 0 || state.executing) return;
            
            state.executing = true;
            state.result = null;
            let curr = { ...state.gameState.robot };
            state.currentRobot = curr;
            renderUI(); // Mise à jour initiale pour verrouiller les boutons

            let failed = false;

            for (let i = 0; i < state.program.length; i++) {
                state.activeCmdIndex = i;
                renderProgram(); // Mettre en surbrillance l'instruction en cours
                
                await delay(600); // Vitesse d'animation

                let cmd = state.program[i];
                let next = { ...curr };

                if (cmd === 'forward') {
                    if (curr.dir === 0) next.y--;
                    else if (curr.dir === 1) next.x++;
                    else if (curr.dir === 2) next.y++;
                    else if (curr.dir === 3) next.x--;
                } else if (cmd === 'backward') {
                    if (curr.dir === 0) next.y++;
                    else if (curr.dir === 1) next.x--;
                    else if (curr.dir === 2) next.y--;
                    else if (curr.dir === 3) next.x++;
                } else if (cmd === 'left') {
                    next.dir = (curr.dir + 3) % 4;
                } else if (cmd === 'right') {
                    next.dir = (curr.dir + 1) % 4;
                }

                // Vérification des collisions avec les bords
                if (next.x < 0 || next.x >= GRID_SIZE || next.y < 0 || next.y >= GRID_SIZE) {
                    state.result = 'wall';
                    failed = true;
                    break;
                }
                // Vérification des collisions avec les obstacles
                if (state.gameState.obstacles.some(o => o.x === next.x && o.y === next.y)) {
                    state.result = 'obstacle';
                    failed = true;
                    break;
                }

                curr = next;
                state.currentRobot = curr;
                renderGrid(); // Mettre à jour la position de la tortue visuellement
            }

            state.activeCmdIndex = -1;

            if (!failed) {
                if (curr.x === state.gameState.target.x && curr.y === state.gameState.target.y) {
                    state.result = 'success';
                    if (state.level === state.maxUnlockedLevel && state.level < 5) {
                        state.maxUnlockedLevel++;
                    }
                } else {
                    state.result = 'miss';
                }
            }
            
            state.executing = false;
            renderUI(); // Afficher les résultats et déverrouiller
        }

        // Configuration des écouteurs d'événements
        document.getElementById('btn-forward').addEventListener('click', () => addCommand('forward'));
        document.getElementById('btn-backward').addEventListener('click', () => addCommand('backward'));
        document.getElementById('btn-left').addEventListener('click', () => addCommand('left'));
        document.getElementById('btn-right').addEventListener('click', () => addCommand('right'));
        document.getElementById('btn-run').addEventListener('click', runSequence);
        document.getElementById('btn-clear').addEventListener('click', clearProgram);
        document.getElementById('btn-reset-pos').addEventListener('click', resetRobot);

        // Lancement du jeu
        window.onload = () => {
            loadLevel(1);
        };
    </script>
</body>
</html>
