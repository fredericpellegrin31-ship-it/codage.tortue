<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Codage</title>
    <!-- Chargement de Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librairie professionnelle pour les confettis -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Transition fluide pour le déplacement du personnage */
        #robot-sprite {
            transition: left 0.5s ease-in-out, top 0.5s ease-in-out, transform 0.5s ease-in-out;
        }

        /* Animation de rebond pour les objets à ramasser */
        .bounce { animation: bounce 1s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(-10%); }
            50% { transform: translateY(10%); }
        }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Grille fixée pour rester carrée */
        .grid-bg-pattern {
            background-image: radial-gradient(var(--tw-gradient-stops));
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col overflow-x-hidden">

    <!-- ECRAN D'ACCUEIL -->
    <div id="home-screen" class="flex-1 flex flex-col items-center justify-center p-6 fade-in">
        <h1 class="text-4xl md:text-5xl font-bold text-slate-800 mb-4 text-center">Choisis ton héros !</h1>
        <p class="text-lg text-slate-600 mb-10 text-center max-w-xl">Programme les déplacements de ton personnage pour ramasser tous les objets sans te cogner dans les obstacles.</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl w-full">
            <!-- Carte Tortue -->
            <button onclick="startGame('turtle')" class="bg-white border-4 border-emerald-200 hover:border-emerald-500 rounded-3xl p-6 flex flex-col items-center gap-4 transition-all hover:scale-105 hover:shadow-xl group">
                <div class="w-32 h-32 bg-emerald-50 rounded-full flex items-center justify-center group-hover:bg-emerald-100 transition-colors">
                    <span class="text-6xl">🐢</span>
                </div>
                <h2 class="text-2xl font-bold text-emerald-800">La Tortue</h2>
                <p class="text-emerald-600 text-sm font-medium">Objectif : Les Salades 🥬</p>
            </button>

            <!-- Carte Pirate -->
            <button onclick="startGame('pirate')" class="bg-white border-4 border-amber-200 hover:border-amber-500 rounded-3xl p-6 flex flex-col items-center gap-4 transition-all hover:scale-105 hover:shadow-xl group">
                <div class="w-32 h-32 bg-amber-50 rounded-full flex items-center justify-center group-hover:bg-amber-100 transition-colors">
                    <span class="text-6xl">🏴‍☠️</span>
                </div>
                <h2 class="text-2xl font-bold text-amber-800">Le Pirate</h2>
                <p class="text-amber-600 text-sm font-medium">Objectif : Les Trésors 💎</p>
            </button>

            <!-- Carte Footballeur -->
            <button onclick="startGame('football')" class="bg-white border-4 border-green-200 hover:border-green-500 rounded-3xl p-6 flex flex-col items-center gap-4 transition-all hover:scale-105 hover:shadow-xl group">
                <div class="w-32 h-32 bg-green-50 rounded-full flex items-center justify-center group-hover:bg-green-100 transition-colors">
                    <span class="text-6xl">🏃</span>
                </div>
                <h2 class="text-2xl font-bold text-green-800">Le Footballeur</h2>
                <p class="text-green-600 text-sm font-medium">Objectif : Les Cages 🥅</p>
            </button>
        </div>
    </div>

    <!-- ECRAN DE JEU -->
    <div id="game-screen" class="hidden flex-1 flex flex-col w-full fade-in">
        <header class="bg-white shadow-sm p-4 z-10 flex flex-wrap items-center justify-between gap-4 border-b">
            <div class="flex items-center gap-3">
                <button onclick="goHome()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-slate-600 transition-colors mr-2" title="Retour à l'accueil">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </button>
                <div id="theme-icon-container" class="text-white p-2 rounded-lg"></div>
                <div>
                    <h1 id="game-title" class="text-xl font-bold text-slate-800 leading-tight">Jeu de Codage</h1>
                    <p id="game-subtitle" class="text-sm text-slate-500">Apprends à programmer !</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-1 md:gap-2 p-1 rounded-lg" id="level-buttons-container">
                <!-- Les boutons de niveau seront générés ici -->
            </div>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10">
            
            <!-- Colonne Gauche : Le jeu (Grille et messages) -->
            <div class="flex flex-col items-center justify-start gap-4">
                <div id="grid-wrapper" class="bg-white p-4 rounded-3xl shadow-sm w-full max-w-[550px]">
                    <!-- La grille avec aspect-square pour forcer le ratio 1:1 -->
                    <div id="grid-container" class="relative w-full aspect-square rounded-2xl overflow-hidden border-4 grid grid-cols-8 grid-rows-8">
                        <!-- Les cases seront injectées ici par JS -->
                    </div>
                </div>

                <div id="message-container" class="w-full max-w-[550px]">
                    <!-- Les messages seront injectés ici par JS -->
                </div>
            </div>

            <!-- Colonne Droite : L'interface de programmation -->
            <div class="flex flex-col gap-6">
                
                <!-- Bloc 1 : Action Pad -->
                <div class="bg-white p-6 rounded-3xl shadow-sm flex flex-col items-center relative overflow-hidden">
                    <h2 class="text-lg font-bold text-slate-800 mb-6 self-start relative z-10">1. Panneau de commande</h2>
                    
                    <div class="grid grid-cols-3 gap-3 w-fit relative z-10">
                        <div></div>
                        <button id="btn-forward" class="bg-blue-500 hover:bg-blue-600 text-white w-16 h-16 rounded-xl flex flex-col items-center justify-center shadow-lg active:scale-95 transition-transform disabled:opacity-50">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                        </button>
                        <div></div>
                        
                        <button id="btn-left" class="bg-orange-500 hover:bg-orange-600 text-white w-16 h-16 rounded-xl flex items-center justify-center shadow-lg active:scale-95 transition-transform disabled:opacity-50">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                        </button>
                        
                        <button id="btn-run" title="Lancer le programme" class="bg-emerald-500 hover:bg-emerald-600 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-xl active:scale-95 transition-transform disabled:opacity-50 border-4 border-emerald-200 z-10">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ml-1"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        </button>
                        
                        <button id="btn-right" class="bg-amber-500 hover:bg-amber-600 text-white w-16 h-16 rounded-xl flex items-center justify-center shadow-lg active:scale-95 transition-transform disabled:opacity-50">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                        </button>
                        
                        <div></div>
                        <button id="btn-backward" class="bg-indigo-500 hover:bg-indigo-600 text-white w-16 h-16 rounded-xl flex items-center justify-center shadow-lg active:scale-95 transition-transform disabled:opacity-50">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                        </button>
                        <div></div>
                    </div>
                </div>

                <!-- Bloc 2 : Affichage du Programme -->
                <div class="bg-white p-6 rounded-3xl shadow-sm flex-1 flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3">
                            <h2 class="text-lg font-bold text-slate-800">2. Ton programme</h2>
                            <span id="program-count" class="text-sm font-medium bg-slate-100 px-3 py-1 rounded-full text-slate-500">
                                0 / 24 blocs
                            </span>
                        </div>
                        <div class="flex gap-2">
                            <button id="btn-reset-pos" title="Replacer le personnage au départ" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-slate-700 disabled:opacity-50 transition-colors">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                            </button>
                            <button id="btn-clear" title="Effacer tout le programme" class="p-2 bg-red-100 hover:bg-red-200 rounded-lg text-red-600 disabled:opacity-50 transition-colors">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    </div>
                    
                    <div id="program-display" class="flex-1 bg-slate-50 rounded-2xl border-2 border-slate-200 border-dashed p-4 min-h-[200px] flex content-start flex-wrap gap-2 overflow-y-auto">
                        <!-- Les blocs de code seront injectés ici -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        const GRID_SIZE = 8;
        const MAX_PROGRAM_LENGTH = 24;

        // ==========================================
        // DÉFINITION DES THÈMES ET GRAPHISMES (Vue de dessus stricte)
        // ==========================================
        
        // 1. La Tortue (Tête en haut, carapace, pattes)
        const turtleSVG = `
            <svg viewBox="0 0 100 100" class="w-[85%] h-[85%] drop-shadow-lg">
                <path d="M 32 30 L 20 18 M 68 30 L 80 18 M 32 70 L 20 82 M 68 70 L 80 82" stroke="#166534" stroke-width="8" stroke-linecap="round"/>
                <polygon points="45,85 55,85 50,98" fill="#166534" />
                <circle cx="50" cy="15" r="14" fill="#22c55e" stroke="#166534" stroke-width="2" />
                <circle cx="45" cy="10" r="2.5" fill="#000" />
                <circle cx="55" cy="10" r="2.5" fill="#000" />
                <ellipse cx="50" cy="52" rx="32" ry="38" fill="#15803d" stroke="#14532d" stroke-width="4"/>
                <path d="M 50 22 L 68 35 L 68 65 L 50 78 L 32 65 L 32 35 Z" fill="#16a34a" stroke="#14532d" stroke-width="2"/>
            </svg>`;

        // 2. Le Pirate (Chapeau bicorne, épaules, épée pointée en avant)
        const pirateSVG = `
            <svg viewBox="0 0 100 100" class="w-[85%] h-[85%] drop-shadow-lg">
                <!-- Épée pointant vers le haut (Y=0) -->
                <rect x="70" y="5" width="6" height="45" fill="#cbd5e1" rx="2"/>
                <rect x="63" y="45" width="20" height="6" fill="#fbbf24" rx="2"/>
                <circle cx="73" cy="50" r="5" fill="#fca5a5" />
                <!-- Bras et Epaules -->
                <rect x="15" y="40" width="70" height="25" rx="10" fill="#7f1d1d" />
                <!-- Tête -->
                <circle cx="50" cy="40" r="16" fill="#fca5a5" />
                <!-- Chapeau Bicorne (vu de dessus) -->
                <path d="M 15 45 Q 50 20 85 45 Q 50 55 15 45" fill="#111827" stroke="#374151" stroke-width="2"/>
                <circle cx="50" cy="40" r="3" fill="white" />
                <!-- Main gauche -->
                <circle cx="20" cy="45" r="5" fill="#fca5a5" />
            </svg>`;

        // 3. Le Footballeur (Maillot bleu, bras en mouvement, ballon devant)
        const footballSVG = `
            <svg viewBox="0 0 100 100" class="w-[85%] h-[85%] drop-shadow-lg">
                <!-- Bras gauche (vers l'avant) -->
                <rect x="18" y="25" width="14" height="35" rx="7" fill="#fca5a5" transform="rotate(15 25 40)" />
                <rect x="18" y="40" width="14" height="20" rx="7" fill="#1d4ed8" transform="rotate(15 25 40)" />
                <!-- Bras droit (vers l'arrière) -->
                <rect x="68" y="40" width="14" height="35" rx="7" fill="#fca5a5" transform="rotate(-15 75 55)" />
                <rect x="68" y="40" width="14" height="20" rx="7" fill="#1d4ed8" transform="rotate(-15 75 55)" />
                <!-- Épaules / Maillot -->
                <rect x="28" y="40" width="44" height="28" rx="12" fill="#2563eb" />
                <!-- Numéro sur le dos -->
                <text x="50" y="60" fill="white" font-size="16" font-family="sans-serif" font-weight="bold" text-anchor="middle">10</text>
                <!-- Tête -->
                <circle cx="50" cy="40" r="15" fill="#fca5a5" />
                <path d="M 35 40 Q 50 20 65 40 Q 50 30 35 40" fill="#451a03" /> <!-- Cheveux -->
                <!-- Ballon de foot (devant la tête, Y=10) -->
                <circle cx="50" cy="12" r="9" fill="white" stroke="#333" stroke-width="1.5"/>
                <path d="M 50 3 L 55 9 L 45 9 Z" fill="#333"/>
                <path d="M 41 15 L 45 9 M 59 15 L 55 9" stroke="#333" stroke-width="1.5"/>
            </svg>`;

        // 4. Le Joueur Rouge (Obstacle Footballeur)
        const redPlayerSVG = `
            <svg viewBox="0 0 100 100" class="w-[85%] h-[85%] drop-shadow-lg">
                <rect x="18" y="25" width="14" height="35" rx="7" fill="#fca5a5" transform="rotate(15 25 40)" />
                <rect x="18" y="40" width="14" height="20" rx="7" fill="#b91c1c" transform="rotate(15 25 40)" />
                <rect x="68" y="40" width="14" height="35" rx="7" fill="#fca5a5" transform="rotate(-15 75 55)" />
                <rect x="68" y="40" width="14" height="20" rx="7" fill="#b91c1c" transform="rotate(-15 75 55)" />
                <rect x="28" y="40" width="44" height="28" rx="12" fill="#ef4444" />
                <text x="50" y="60" fill="white" font-size="16" font-family="sans-serif" font-weight="bold" text-anchor="middle">5</text>
                <circle cx="50" cy="40" r="15" fill="#fca5a5" />
                <path d="M 35 40 Q 50 20 65 40 Q 50 30 35 40" fill="#451a03" />
            </svg>`;

        const THEMES = {
            turtle: {
                id: 'turtle', name: 'La Tortue', robotSVG: turtleSVG, targetIcon: '🥬', obstacleIcon: '🪨',
                bgClass: 'bg-emerald-600', gridBorderClass: 'border-emerald-300', 
                gridCellClass: 'border-emerald-200 from-emerald-100 to-transparent'
            },
            pirate: {
                id: 'pirate', name: 'Le Pirate', robotSVG: pirateSVG, targetIcon: '💎', obstacleIcon: '🌴',
                bgClass: 'bg-amber-600', gridBorderClass: 'border-amber-300', 
                gridCellClass: 'border-amber-200 from-amber-100 to-transparent'
            },
            football: {
                id: 'football', name: 'Le Footballeur', robotSVG: footballSVG, targetIcon: '🥅', obstacleIcon: redPlayerSVG,
                bgClass: 'bg-green-600', gridBorderClass: 'border-green-400', 
                gridCellClass: 'border-green-300 from-green-200 to-transparent'
            }
        };

        const COMMAND_DETAILS = {
            'forward': { color: 'bg-blue-500', svg: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>' },
            'backward': { color: 'bg-indigo-500', svg: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>' },
            'left': { color: 'bg-orange-500', svg: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>' },
            'right': { color: 'bg-amber-500', svg: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>' }
        };

        // ==========================================
        // ETAT DU JEU
        // ==========================================
        let state = {
            currentTheme: THEMES.turtle,
            level: 1,
            maxUnlockedLevel: 1,
            gameState: null,
            currentRobot: null,
            program: [],
            executing: false,
            activeCmdIndex: -1,
            collectedItems: [], 
            result: null // 'success', 'wall', 'obstacle', 'miss', 'missing_items'
        };

        // ==========================================
        // ALGORITHME ET GÉNÉRATION DES NIVEAUX
        // ==========================================
        function getShortestPathWithItems(startX, startY, startDir, targetX, targetY, obstacles, items) {
            let queue = [{ x: startX, y: startY, dir: startDir, path: [], mask: 0 }];
            let visited = new Set();
            visited.add(`${startX},${startY},${startDir},0`);

            let isObstacle = (x, y) => obstacles.some(o => o.x === x && o.y === y);
            let getItemIndex = (x, y) => items.findIndex(w => w.x === x && w.y === y);
            let targetMask = (1 << items.length) - 1; 

            while (queue.length > 0) {
                let { x, y, dir, path, mask } = queue.shift();

                let itemIdx = getItemIndex(x, y);
                let newMask = mask;
                if (itemIdx !== -1) newMask = mask | (1 << itemIdx); 

                // Victoire : on est sur la cible ET on a ramassé tous les autres objets
                if (x === targetX && y === targetY && newMask === targetMask) {
                    return path;
                }

                let moves = [];
                let fx = x, fy = y;
                if (dir === 0) fy--; else if (dir === 1) fx++; else if (dir === 2) fy++; else if (dir === 3) fx--;
                if (fx >= 0 && fx < GRID_SIZE && fy >= 0 && fy < GRID_SIZE && !isObstacle(fx, fy)) {
                    moves.push({ x: fx, y: fy, dir, mask: newMask, action: 'forward' });
                }
                
                let bx = x, by = y;
                if (dir === 0) by++; else if (dir === 1) bx--; else if (dir === 2) by--; else if (dir === 3) bx++;
                if (bx >= 0 && bx < GRID_SIZE && by >= 0 && by < GRID_SIZE && !isObstacle(bx, by)) {
                    moves.push({ x: bx, y: by, dir, mask: newMask, action: 'backward' });
                }
                
                moves.push({ x, y, dir: (dir + 3) % 4, mask: newMask, action: 'left' });
                moves.push({ x, y, dir: (dir + 1) % 4, mask: newMask, action: 'right' });

                for (let m of moves) {
                    let key = `${m.x},${m.y},${m.dir},${m.mask}`;
                    if (!visited.has(key)) {
                        visited.add(key);
                        queue.push({ x: m.x, y: m.y, dir: m.dir, mask: m.mask, path: [...path, m.action] });
                    }
                }
            }
            return null;
        }

        function createLevel(lvl) {
            let robot, target, obstacles = [], items = [];

            // Niv 1 : Avancer uniquement
            if (lvl === 1) {
                let x = Math.floor(Math.random() * GRID_SIZE);
                let y = Math.floor(Math.random() * 4) + 4; 
                robot = { x, y, dir: 0 };
                target = { x, y: y - (Math.floor(Math.random() * 3) + 2) };
                return { robot, target, obstacles, items };
            }

            // Niv 2 & 3 : Avancer + Pivoter
            if (lvl === 2 || lvl === 3) {
                let dir1 = lvl === 2 ? 0 : [1, 2, 3][Math.floor(Math.random() * 3)];
                let d1 = Math.floor(Math.random() * 3) + 1;
                let d2 = Math.floor(Math.random() * 3) + 1;
                let turn = Math.random() < 0.5 ? 1 : -1;
                let dir2 = (dir1 + turn + 4) % 4;

                let ix = Math.floor(Math.random() * 6) + 1;
                let iy = Math.floor(Math.random() * 6) + 1;

                let startX = ix, startY = iy;
                if (dir1 === 0) startY += d1; else if (dir1 === 1) startX -= d1;
                else if (dir1 === 2) startY -= d1; else if (dir1 === 3) startX += d1;

                let endX = ix, endY = iy;
                if (dir2 === 0) endY -= d2; else if (dir2 === 1) endX += d2;
                else if (dir2 === 2) endY += d2; else if (dir2 === 3) endX -= d2;

                if (startX >= 0 && startX < GRID_SIZE && startY >= 0 && startY < GRID_SIZE &&
                    endX >= 0 && endX < GRID_SIZE && endY >= 0 && endY < GRID_SIZE &&
                    (startX !== endX || startY !== endY)) {
                    return { robot: { x: startX, y: startY, dir: dir1 }, target: { x: endX, y: endY }, obstacles: [], items: [] };
                } else {
                    return createLevel(lvl); 
                }
            }

            // Niv 4 à 10 : Obstacles et Objets à collectionner
            let attempts = 0;
            while (attempts < 2500) {
                attempts++;
                let rx = Math.floor(Math.random() * GRID_SIZE);
                let ry = Math.floor(Math.random() * GRID_SIZE);
                let rdir = Math.floor(Math.random() * 4);
                let tx = Math.floor(Math.random() * GRID_SIZE);
                let ty = Math.floor(Math.random() * GRID_SIZE);
                if (Math.abs(rx - tx) + Math.abs(ry - ty) < 3) continue; 

                let obs = [];
                let itms = [];
                
                // Nombre d'objets intermédiaires à ramasser
                let numItems = 0;
                if (lvl === 7) numItems = 1;
                if (lvl >= 8 && lvl <= 9) numItems = 2;
                if (lvl === 10) numItems = 3;

                // Nombre d'obstacles
                let numObs = 0;
                if (lvl === 4) numObs = 3;
                if (lvl === 5) numObs = 5;
                if (lvl === 6) numObs = 7;
                if (lvl === 7) numObs = 4;
                if (lvl === 8) numObs = 5;
                if (lvl === 9) numObs = 7;
                if (lvl === 10) numObs = 8;

                // Placement des objets à ramasser
                for (let i = 0; i < numItems; i++) {
                    let wx = Math.floor(Math.random() * GRID_SIZE);
                    let wy = Math.floor(Math.random() * GRID_SIZE);
                    if ((wx !== rx || wy !== ry) && (wx !== tx || wy !== ty) && !itms.some(w => w.x === wx && w.y === wy)) {
                        itms.push({ x: wx, y: wy });
                    }
                }
                if (itms.length < numItems) continue; 

                // Placement des obstacles
                for (let i = 0; i < numObs; i++) {
                    let ox = Math.floor(Math.random() * GRID_SIZE);
                    let oy = Math.floor(Math.random() * GRID_SIZE);
                    if ((ox !== rx || oy !== ry) && (ox !== tx || oy !== ty) && !itms.some(w => w.x === ox && w.y === oy)) {
                        if (!obs.some(o => o.x === ox && o.y === oy)) obs.push({ x: ox, y: oy });
                    }
                }

                // Vérification avec l'algo BFS
                let path = getShortestPathWithItems(rx, ry, rdir, tx, ty, obs, itms);
                if (path) {
                    let requiredLength = attempts > 500 ? 3 : (lvl >= 8 ? 7 : 5);
                    if (path.length >= requiredLength) {
                        return { robot: { x: rx, y: ry, dir: rdir }, target: { x: tx, y: ty }, obstacles: obs, items: itms };
                    }
                }
            }

            // Fallback de sécurité
            return {
                robot: { x: 0, y: GRID_SIZE - 1, dir: 0 },
                target: { x: GRID_SIZE - 1, y: 0 },
                obstacles: lvl >= 4 ? [{ x: 3, y: 3 }, { x: 4, y: 4 }] : [],
                items: lvl >= 7 ? [{ x: 2, y: 2 }] : []
            };
        }

        // ==========================================
        // GESTION DE L'INTERFACE (UI)
        // ==========================================
        
        function startGame(themeId) {
            state.currentTheme = THEMES[themeId];
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            // Appliquer les couleurs du thème au header
            const iconContainer = document.getElementById('theme-icon-container');
            iconContainer.className = `text-white p-2 rounded-lg ${state.currentTheme.bgClass}`;
            iconContainer.innerHTML = `<span class="text-2xl">${state.currentTheme.targetIcon}</span>`;
            
            document.getElementById('game-title').textContent = state.currentTheme.name;
            
            loadLevel(1);
        }

        function goHome() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
        }

        function renderUI() {
            renderHeader();
            renderGrid();
            renderProgram();
            renderMessages();
            updateButtonsState();
        }

        function renderHeader() {
            const container = document.getElementById('level-buttons-container');
            container.innerHTML = '';
            for (let l = 1; l <= 10; l++) {
                const btn = document.createElement('button');
                const isLocked = l > state.maxUnlockedLevel;
                const isActive = state.level === l;
                
                let classes = `px-3 md:px-4 py-1.5 md:py-2 rounded-md font-bold transition-colors flex items-center gap-1.5 text-sm md:text-base `;
                if (isActive) classes += `bg-white shadow-sm text-slate-800 ring-2 ${state.currentTheme.gridBorderClass.replace('border', 'ring')} `;
                else classes += `text-slate-500 hover:bg-slate-200 `;
                if (isLocked || state.executing) classes += `opacity-50 cursor-not-allowed `;
                
                btn.className = classes;
                btn.disabled = isLocked || state.executing;
                btn.onclick = () => { if (!state.executing && l <= state.maxUnlockedLevel) loadLevel(l); };
                btn.innerHTML = `Niv ${l} ${isLocked ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>' : ''}`;
                container.appendChild(btn);
            }
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            // Sécurisation de la classe de la grille
            container.className = `relative w-full aspect-square rounded-2xl overflow-hidden border-4 grid grid-cols-8 grid-rows-8 ${state.currentTheme.gridBorderClass}`;
            container.innerHTML = '';

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                let x = i % GRID_SIZE;
                let y = Math.floor(i / GRID_SIZE);
                
                let isTarget = state.gameState.target.x === x && state.gameState.target.y === y;
                let isObstacle = state.gameState.obstacles.some(o => o.x === x && o.y === y);
                
                let itemIndex = state.gameState.items.findIndex(w => w.x === x && w.y === y);
                let isItem = itemIndex !== -1;
                let isCollected = isItem && state.collectedItems.includes(itemIndex);

                const cell = document.createElement('div');
                cell.className = `border flex items-center justify-center relative ${state.currentTheme.gridCellClass.split(' ')[0]}`;
                
                // Motif de fond
                const bg = document.createElement('div');
                bg.className = `absolute inset-0 opacity-20 grid-bg-pattern from-${state.currentTheme.gridCellClass.split('-')[2]}-300 to-transparent`;
                cell.appendChild(bg);

                // Objet intermédiaire à ramasser (Disparait si collecté)
                if (isItem && !isCollected) {
                    const itemEl = document.createElement('span');
                    itemEl.className = "text-2xl md:text-4xl drop-shadow-md z-10 bounce flex items-center justify-center w-full h-full";
                    itemEl.innerHTML = state.currentTheme.targetIcon;
                    cell.appendChild(itemEl);
                }

                // Cible finale
                if (isTarget) {
                    const targetEl = document.createElement('span');
                    targetEl.className = "text-2xl md:text-4xl drop-shadow-md z-10 bounce flex items-center justify-center w-full h-full";
                    targetEl.innerHTML = state.currentTheme.targetIcon;
                    cell.appendChild(targetEl);
                } else if (isObstacle) {
                    const obsEl = document.createElement('span');
                    obsEl.className = "text-2xl md:text-4xl drop-shadow-md z-10 flex items-center justify-center w-full h-full";
                    obsEl.innerHTML = state.currentTheme.obstacleIcon;
                    cell.appendChild(obsEl);
                }

                container.appendChild(cell);
            }

            // Personnage
            if (state.currentRobot) {
                const robot = document.createElement('div');
                robot.id = "robot-sprite";
                robot.className = "absolute z-20 w-[12.5%] h-[12.5%] flex items-center justify-center";
                
                robot.style.left = `${state.currentRobot.x * 12.5}%`;
                robot.style.top = `${state.currentRobot.y * 12.5}%`;
                robot.style.transform = `rotate(${state.currentRobot.dir * 90}deg)`;

                robot.innerHTML = state.currentTheme.robotSVG;
                container.appendChild(robot);
            }
        }

        function renderProgram() {
            const container = document.getElementById('program-display');
            document.getElementById('program-count').textContent = `${state.program.length} / ${MAX_PROGRAM_LENGTH} blocs`;
            container.innerHTML = '';

            if (state.program.length === 0) {
                container.innerHTML = `<div class="w-full h-full flex items-center justify-center text-slate-400 italic text-center px-4">Utilise les boutons à gauche pour construire ton programme...</div>`;
                return;
            }

            state.program.forEach((cmdKey, idx) => {
                const cmd = COMMAND_DETAILS[cmdKey];
                const isActive = idx === state.activeCmdIndex;
                
                const block = document.createElement('div');
                block.className = `${cmd.color} text-white w-10 h-10 md:w-12 md:h-12 rounded-lg flex items-center justify-center shadow-sm relative transition-all ${isActive ? 'ring-4 ring-yellow-400 scale-110 z-30' : ''}`;
                block.innerHTML = cmd.svg;

                const num = document.createElement('span');
                num.className = "absolute -top-2 -right-2 bg-white text-slate-800 text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full shadow-sm border border-slate-200";
                num.textContent = idx + 1;
                block.appendChild(num);

                container.appendChild(block);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderMessages() {
            const container = document.getElementById('message-container');
            container.innerHTML = '';

            if (state.result) {
                const isSuccess = state.result === 'success';
                const isWarning = state.result === 'missing_items';
                
                let bgColor, textColor, borderColor;
                if (isSuccess) { bgColor = 'bg-green-100'; textColor = 'text-green-800'; borderColor = 'border-green-200'; }
                else if (isWarning) { bgColor = 'bg-orange-100'; textColor = 'text-orange-800'; borderColor = 'border-orange-200'; }
                else { bgColor = 'bg-red-100'; textColor = 'text-red-800'; borderColor = 'border-red-200'; }

                const div = document.createElement('div');
                div.className = `p-4 rounded-xl flex items-center flex-wrap gap-3 font-medium text-lg fade-in ${bgColor} ${textColor} border-2 ${borderColor}`;
                
                let icon = isSuccess 
                    ? '<svg class="shrink-0" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
                    : (isWarning ? '<svg class="shrink-0" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>'
                                 : '<svg class="shrink-0" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>');
                
                let text = "";
                let itemNomPlural = state.currentTheme.id === 'turtle' ? 'toutes les salades' : (state.currentTheme.id === 'pirate' ? 'tous les trésors' : 'toutes les cages de foot');
                
                if (state.result === 'success') text = `Bravo ! Mission accomplie !`;
                else if (state.result === 'missing_items') text = `Oups ! Tu as oublié de passer par ${itemNomPlural} !`;
                else if (state.result === 'wall') text = "Aïe ! Le personnage a percuté le bord du terrain.";
                else if (state.result === 'obstacle') text = "Boum ! Collision avec un obstacle.";
                else if (state.result === 'miss') text = `Zut ! Tu n'es pas arrivé sur l'objectif final.`;

                let nextBtn = '';
                if (isSuccess && state.level < 10) {
                    nextBtn = `<button onclick="loadLevel(${state.level + 1})" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-slate-900 transition-colors ml-auto whitespace-nowrap">Niveau suivant ➡️</button>`;
                }

                div.innerHTML = `<div class="flex items-center gap-3 w-full">${icon}<span class="flex-1">${text}</span>${nextBtn}</div>`;
                container.appendChild(div);
            } else {
                const div = document.createElement('div');
                div.className = "p-4 bg-slate-100 text-slate-800 rounded-xl flex items-center gap-3 border border-slate-200";
                
                let msg = "";
                
                if (state.level === 1) {
                    if (state.currentTheme.id === 'turtle') msg = `Fais avancer ton personnage jusqu'à la salade.`;
                    else if (state.currentTheme.id === 'pirate') msg = `Fais avancer ton personnage jusqu'au trésor.`;
                    else if (state.currentTheme.id === 'football') msg = `Fais avancer ton personnage jusqu'à la cage de foot.`;
                }
                else if (state.level === 2) msg = `Utilise les blocs 'Pivoter' pour tourner.`;
                else if (state.level === 3) msg = `Attention, regarde bien dans quelle direction tu commences !`;
                else if (state.level >= 4 && state.level <= 6) msg = `Attention aux obstacles ! Trouve un chemin sûr.`;
                else if (state.level >= 7) {
                    if (state.currentTheme.id === 'turtle') msg = `Tu dois passer par toutes les salades (${state.currentTheme.targetIcon}) avant d'aller sur la case finale !`;
                    else if (state.currentTheme.id === 'pirate') msg = `Tu dois passer par tous les trésors (${state.currentTheme.targetIcon}) avant d'aller sur la case finale !`;
                    else if (state.currentTheme.id === 'football') msg = `Tu dois passer par toutes les cages de foot (${state.currentTheme.targetIcon}) avant d'aller sur la case finale !`;
                }

                div.innerHTML = `<svg class="shrink-0" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg><span class="text-sm font-medium">${msg}</span>`;
                container.appendChild(div);
            }
        }

        function updateButtonsState() {
            document.getElementById('btn-forward').disabled = state.executing;
            document.getElementById('btn-backward').disabled = state.executing;
            document.getElementById('btn-left').disabled = state.executing;
            document.getElementById('btn-right').disabled = state.executing;
            document.getElementById('btn-run').disabled = state.executing || state.program.length === 0;
            document.getElementById('btn-clear').disabled = state.executing || state.program.length === 0;
            document.getElementById('btn-reset-pos').disabled = state.executing || state.result === null;
        }

        // ==========================================
        // LOGIQUE D'ÉXÉCUTION
        // ==========================================
        
        function loadLevel(l) {
            state.level = l;
            const newLvl = createLevel(l);
            state.gameState = newLvl;
            state.currentRobot = { ...newLvl.robot };
            state.program = [];
            state.collectedItems = [];
            state.result = null;
            state.activeCmdIndex = -1;
            renderUI();
        }

        function addCommand(cmd) {
            if (!state.executing && state.program.length < MAX_PROGRAM_LENGTH) {
                state.program.push(cmd);
                renderProgram();
                updateButtonsState();
            }
        }

        function clearProgram() {
            if (!state.executing) {
                state.program = [];
                renderProgram();
                updateButtonsState();
            }
        }

        function resetRobot() {
            if (!state.executing) {
                state.currentRobot = { ...state.gameState.robot };
                state.collectedItems = [];
                state.result = null;
                state.activeCmdIndex = -1;
                renderUI();
            }
        }

        function triggerConfetti() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 };
            
            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                
                // Depuis la gauche
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                // Depuis la droite
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function runSequence() {
            if (state.program.length === 0 || state.executing) return;
            
            state.executing = true;
            state.result = null;
            state.collectedItems = [];
            
            // Collecte immédiate si on commence sur un objet
            let startItemIdx = state.gameState.items.findIndex(w => w.x === state.gameState.robot.x && w.y === state.gameState.robot.y);
            if (startItemIdx !== -1) state.collectedItems.push(startItemIdx);

            let curr = { ...state.gameState.robot };
            state.currentRobot = curr;
            renderUI(); 

            let failed = false;

            for (let i = 0; i < state.program.length; i++) {
                state.activeCmdIndex = i;
                renderProgram(); 
                
                await delay(600); 

                let cmd = state.program[i];
                let next = { ...curr };

                if (cmd === 'forward') {
                    if (curr.dir === 0) next.y--;
                    else if (curr.dir === 1) next.x++;
                    else if (curr.dir === 2) next.y++;
                    else if (curr.dir === 3) next.x--;
                } else if (cmd === 'backward') {
                    if (curr.dir === 0) next.y++;
                    else if (curr.dir === 1) next.x--;
                    else if (curr.dir === 2) next.y--;
                    else if (curr.dir === 3) next.x++;
                } else if (cmd === 'left') {
                    next.dir = (curr.dir + 3) % 4;
                } else if (cmd === 'right') {
                    next.dir = (curr.dir + 1) % 4;
                }

                // Collisions murs
                if (next.x < 0 || next.x >= GRID_SIZE || next.y < 0 || next.y >= GRID_SIZE) {
                    state.result = 'wall';
                    failed = true;
                    break;
                }
                // Collisions obstacles
                if (state.gameState.obstacles.some(o => o.x === next.x && o.y === next.y)) {
                    state.result = 'obstacle';
                    failed = true;
                    break;
                }

                curr = next;
                state.currentRobot = curr;
                
                // Collecte des objets
                let itemIdx = state.gameState.items.findIndex(w => w.x === curr.x && w.y === curr.y);
                if (itemIdx !== -1 && !state.collectedItems.includes(itemIdx)) {
                    state.collectedItems.push(itemIdx);
                }

                renderGrid(); // Met à jour l'animation de déplacement et la disparition de l'objet
            }

            state.activeCmdIndex = -1;

            if (!failed) {
                if (curr.x === state.gameState.target.x && curr.y === state.gameState.target.y) {
                    if (state.collectedItems.length === state.gameState.items.length) {
                        state.result = 'success';
                        triggerConfetti();
                        if (state.level === state.maxUnlockedLevel && state.level < 10) {
                            state.maxUnlockedLevel++;
                        }
                    } else {
                        state.result = 'missing_items';
                    }
                } else {
                    state.result = 'miss';
                }
            }
            
            state.executing = false;
            renderUI(); 
        }

        // Branchement des écouteurs de clics
        document.getElementById('btn-forward').addEventListener('click', () => addCommand('forward'));
        document.getElementById('btn-backward').addEventListener('click', () => addCommand('backward'));
        document.getElementById('btn-left').addEventListener('click', () => addCommand('left'));
        document.getElementById('btn-right').addEventListener('click', () => addCommand('right'));
        document.getElementById('btn-run').addEventListener('click', runSequence);
        document.getElementById('btn-clear').addEventListener('click', clearProgram);
        document.getElementById('btn-reset-pos').addEventListener('click', resetRobot);
        
    </script>
</body>
</html>
